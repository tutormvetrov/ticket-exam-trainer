name: Release

# Триггер: пуш тега вида `v1.2.3` или `v1.2.3-rc1`. Workflow собирает
# Windows installer, Windows portable ZIP и macOS portable DMG для x64/arm64.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Check release guardrails
        shell: pwsh
        run: |
          python scripts/check_release_guardrails.py

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure bundled seed exists
        shell: pwsh
        run: |
          if (-not (Test-Path "data/state_exam_public_admin_demo.db")) {
            Write-Error "Seed DB missing. Commit data/state_exam_public_admin_demo.db to git."
            exit 1
          }

      - name: Build Windows exe
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ./scripts/build_flet_exe.ps1

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y

      - name: Assert onefile build (installer requires single dist\Tezis.exe)
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\Tezis.exe")) {
            throw "dist\Tezis.exe not found — PyInstaller build may have failed"
          }
          if (Test-Path -LiteralPath "dist\Tezis") {
            throw "dist\Tezis\ directory found — installer requires onefile build, not onedir"
          }

      - name: Build Windows installer (Tezis-Setup.exe)
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Building installer for version: $version"
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          & $iscc "/DAppVersion=$version" scripts\installer\Tezis-Setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed: $LASTEXITCODE" }
          $setupName = "Tezis-Setup-$tag-windows-x64.exe"
          Rename-Item dist\Tezis-Setup.exe $setupName
          Write-Host "Built: dist\$setupName"
          Get-Item "dist\$setupName" | Format-Table Name,Length

      - name: Package Windows zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $stagingDir = "release-staging-windows"
          $scriptsDir = Join-Path $stagingDir "scripts"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          New-Item -ItemType Directory -Force -Path $scriptsDir | Out-Null
          Copy-Item -Recurse -Force "dist/*" -Destination $stagingDir -Exclude "*Setup*.exe"
          Copy-Item -Force "scripts/install_ollama_wizard.ps1" -Destination $scriptsDir
          Copy-Item -Force "scripts/check_ollama.ps1" -Destination $scriptsDir
          Copy-Item -Force "scripts/setup_ollama_windows.ps1" -Destination $scriptsDir
          Copy-Item -Recurse -Force "data" -Destination $stagingDir
          Copy-Item -Force "README_classmates.md" -Destination $stagingDir
          $zipName = "Tezis-$tag-windows-x64-portable.zip"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName -Force
          Write-Host "Zipped: $zipName"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tezis-windows
          path: Tezis-*-windows-x64-portable.zip
          retention-days: 7

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tezis-windows-setup
          path: dist/Tezis-Setup-*-windows-x64.exe
          retention-days: 7

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 is the standard Apple Silicon runner; macos-15-intel is the
          # current explicit Intel runner. Avoid macos-latest so runner migration
          # does not silently flip architectures.
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Check release guardrails
        run: python scripts/check_release_guardrails.py

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure bundled seed exists
        run: |
          if [ ! -f "data/state_exam_public_admin_demo.db" ]; then
            echo "Seed DB missing — classmates won't have tickets"
            exit 1
          fi

      - name: Run focused macOS runtime tests
        run: |
          python -m pytest -q \
            tests/test_platform_support.py \
            tests/test_ollama_runtime.py \
            tests/test_ollama_service.py \
            tests/test_facade_review_fastfail.py \
            tests/test_settings_view_helpers.py

      - name: Package macOS portable DMG
        run: |
          chmod +x scripts/build_mac_app.sh scripts/package_macos_dmg.sh
          ./scripts/package_macos_dmg.sh --build --python python3 --arch "${{ matrix.arch }}" --version "${{ github.ref_name }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tezis-macos-${{ matrix.arch }}
          path: dist/release/v*/macos/${{ matrix.arch }}/Tezis-*-macos-${{ matrix.arch }}-portable.dmg
          retention-days: 7

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "Tezis-*.zip" -o -name "Tezis-*.exe" -o -name "Tezis-*.dmg" \) -exec cp {} release-files/ \;
          test -n "$(find release-files -maxdepth 1 -type f -name 'Tezis-*.zip' -print -quit)"
          test -n "$(find release-files -maxdepth 1 -type f -name 'Tezis-*.exe' -print -quit)"
          test -n "$(find release-files -maxdepth 1 -type f -name 'Tezis-*.dmg' -print -quit)"
          ls -la release-files/

      - name: Generate checksums
        run: |
          tag="${{ github.ref_name }}"
          (
            cd release-files
            sha256sum Tezis-* > "checksums-$tag.txt"
          )
          cat "release-files/checksums-$tag.txt"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-files/*.zip
            release-files/*.exe
            release-files/*.dmg
            release-files/checksums-*.txt
          body: |
            Автосборка: Windows installer + Windows portable ZIP + macOS portable DMG.

            **Windows (рекомендуется):** скачай `Tezis-Setup-*-windows-x64.exe`,
            запусти, нажми «Установить». Мастер создаст ярлыки и запись в «Программы».
            SmartScreen при первом запуске: «Подробнее» → «Выполнить в любом
            случае» (приложение не подписано сертификатом).

            **Windows (portable):** скачай `Tezis-*-windows-x64-portable.zip`, распакуй,
            запусти `Tezis.exe`.

            **macOS (portable):** скачай `Tezis-*-macos-arm64-portable.dmg`
            для Apple Silicon или `Tezis-*-macos-x64-portable.dmg` для Intel,
            открой DMG и перетащи `Tezis.app` в Applications. Первый запуск:
            правый клик → «Открыть» (обход Gatekeeper).

            **Проверка файлов:** SHA256 лежат в `checksums-${{ github.ref_name }}.txt`.

            **Опциональный ИИ-рецензент (Ollama):**
            Windows: при установке отметь галочку «Установить Ollama».
            macOS: Settings → Рецензирование.

            Инструкция — в `README_classmates.md` внутри архива.
