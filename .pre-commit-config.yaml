repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-gemini-plaintext-key
        name: Reject plaintext Gemini API keys
        language: pygrep
        entry: 'AIzaSy[A-Za-z0-9_-]{30,}'
        exclude: '^(tests/|archive/|app_data/settings\.json)'
        types: [text]
